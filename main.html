<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My p5 Sketch</title><script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.left{
justify-content: flex-start;
}

p{
margin: 0;
font-size: 1.4rem;
}

label{
margin-top: 10px;
font-size: 1.6rem;}
</style>
</head>
<body>
	<div class="container">

		<div class="left">
			

				<p class="highlight">	Final Equation

				$${v_t = \sqrt{\frac{2mg}{\rho C_d A}}}$$ </p>

<p id="vval"></p>

<label for="mass">Mass</label>
<input class="slider" type="range" value="10" min="1" max="100" step="0.1" id="mass">
<p id="mval"></p>

<label for="area">Area</label>
<input class="slider" type="range" value="0.9" min="0.1" max="20" step="0.1" id="area">
<p id="aval"></p>

<label for="p">Density of the medium</label>
<input class="slider" type="range" value="1.2" min="0.1" max="5" step="0.1" id="p">
<p id="pval"></p>

<label for="gravity">Gravity</label>
<input class="slider"  type="range" value="9.8" min="0.1" max="50" step="0.1" id="gravity">
<p id="gval"></p>

<button id="restart">Drop the ball once again</button>
<button id="nextButton">Next</button>
<button id="prev">Back</button>
		</div>
		<div class="right" id="right">
<script>

let gs = document.getElementById("gravity");
let ms = document.getElementById("mass");
let As = document.getElementById("area"); 
let ps = document.getElementById("p");

document.getElementById("prev").onclick = function(){
window.location.href = "algebra.html";
}
document.getElementById("restart").onclick = function(){
	y = 100;
	v = 0;
}

function setup() {
frameRate(60);
  let canvas = createCanvas(windowWidth/2 ,windowHeight);
canvas.parent("right");
}
let v = 0;
let g;
let y = 100;
let p;
let C= 0.47;
let A;
let m;
function draw() {
g = parseFloat(gs.value);
p = parseFloat(ps.value);
A = parseFloat(As.value);
m = parseFloat(ms.value);

let gsl = document.getElementById("gval");
let msl = document.getElementById("mval");
let asl = document.getElementById("aval");
let psl = document.getElementById("pval");
let vsl = document.getElementById("vval");


gsl.innerHTML ="Acceleration due to gravity = " + g.toFixed(1) + " m/s²";
msl.innerHTML = "Mass = " + m.toFixed(1) + " kg";
psl.innerHTML = "Density of the medium = " + p.toFixed(1) + " kg/m³";
asl.innerHTML = "Effective area of the object = " + A.toFixed(1) + " m²";

 background("#87CEEB");  
  fill(255);
stroke(255);
let ball =  circle(width/2, y, 10*A);
let a = g - 0.5 * p * C * A * v * abs(v) / m;
let dt = 1/60;
	v+=a*dt;
	y+=v*dt;

vsl.innerHTML = "Velocity = " + v.toFixed(1) + " m/s";

if(y>=0.8*height-5*A){y=0.8*height-5*A;v= -0.01*v;}
fill("#4CAF50");
stroke("#2E7D32");
strokeWeight(4);
let ground = rect(0, height*0.8,width, height*0.2);
}

</script>
	</div>
</div>
</body>
</html>
